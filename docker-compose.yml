services:
  postgres:
    image: postgres:17-alpine
    container_name: golden-eggs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: golden_eggs_estates
    ports:
      - "5432:5432"
    volumes:
      - golden_eggs_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: golden-eggs-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/golden_eggs_estates
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: golden-eggs-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  golden_eggs_pg_data:
